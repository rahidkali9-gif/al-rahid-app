# Al Rahid — Nginx Configuration

Production Nginx config for the Al Rahid backend (API) and admin panel (SPA).

Place these in `/etc/nginx/sites-available/` and symlink to `/etc/nginx/sites-enabled/`.

## API Backend (api.yourdomain.com)

```nginx
server {
    listen 80;
    server_name api.yourdomain.com;

    # Upload size limit (must match MAX_FILE_SIZE_MB in .env)
    client_max_body_size 50M;

    # Rate limiting zone
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    location / {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # Timeouts for AI endpoints (can take up to 120s)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        proxy_cache_bypass $http_upgrade;
    }

    # Static uploads served directly by backend, but Nginx can cache
    location /uploads/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
```

## Admin Panel (admin.yourdomain.com)

```nginx
server {
    listen 80;
    server_name admin.yourdomain.com;

    root /opt/alrahid/admin-panel/dist;
    index index.html;

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
```

## SSL (applied after Certbot)

After running `sudo certbot --nginx -d api.yourdomain.com -d admin.yourdomain.com`,
Certbot will automatically add the SSL configuration. The result will look like:

```nginx
server {
    listen 443 ssl http2;
    server_name api.yourdomain.com;

    ssl_certificate /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ... (same location blocks as above)
}

server {
    if ($host = api.yourdomain.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name api.yourdomain.com;
    return 404;
}
```

## Combined Config (single domain)

If you serve both API and admin panel on the same domain under different paths:

```nginx
server {
    listen 80;
    server_name yourdomain.com;
    client_max_body_size 50M;

    # Admin panel at /
    root /opt/alrahid/admin-panel/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API at /api (proxied to backend)
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:3000;
    }

    # Uploads
    location /uploads/ {
        proxy_pass http://127.0.0.1:3000;
        expires 30d;
    }
}
```
